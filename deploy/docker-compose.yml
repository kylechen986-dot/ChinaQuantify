services:
  postgres:
    image: postgres:16
    container_name: china_quantify_postgres
    environment:
      POSTGRES_DB: china_quantify
      POSTGRES_USER: china_quantify
      POSTGRES_PASSWORD: china_quantify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: china_quantify_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
